name: HEN Daily Morning Report

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  morning-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run morning report
        env:
          # ── ERCOT ────────────────────────────────────────────────────────
          ERCOT_USERNAME:         ${{ secrets.ERCOT_USERNAME }}
          ERCOT_PASSWORD:         ${{ secrets.ERCOT_PASSWORD }}
          ERCOT_SUBSCRIPTION_KEY: ${{ secrets.ERCOT_SUBSCRIPTION_KEY }}
          ERCOT_NODES:            ${{ secrets.ERCOT_TEST_NODES }}

          # ── Email ────────────────────────────────────────────────────────
          SENDGRID_API_KEY:       ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL:             ${{ secrets.FROM_EMAIL }}
          TO_EMAILS:              ${{ secrets.TO_EMAILS }}

          # ── Claude AI ────────────────────────────────────────────────────
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}

          # ── AG2 Trader weather & load forecasts ──────────────────────────
          AG2_ACCOUNT:            ${{ secrets.AG2_ACCOUNT }}
          AG2_PROFILE:            ${{ secrets.AG2_PROFILE }}
          AG2_PASSWORD:           ${{ secrets.AG2_PASSWORD }}

          # ── Modo Energy custom indices ───────────────────────────────────
          MODO_API_KEY:           ${{ secrets.MODO_API_KEY }}
          MODO_INDEX_IDS:         ${{ secrets.MODO_INDEX_IDS }}

          # ── PowerTools asset availability ────────────────────────────────
          POWERTOOLS_URL:         ${{ secrets.POWERTOOLS_URL }}
          POWERTOOLS_API_KEY:     ${{ secrets.POWERTOOLS_API_KEY }}
          POWERTOOLS_USERNAME:    ${{ secrets.POWERTOOLS_USERNAME }}
          POWERTOOLS_PASSWORD:    ${{ secrets.POWERTOOLS_PASSWORD }}

        run: python hen_morning_report.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-report-${{ github.run_id }}
          path: morning_report.html
          retention-days: 30

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Morning report failed - ${new Date().toISOString().slice(0,10)}`,
              body: `Pipeline failed. Check run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['report-failure']
            })
