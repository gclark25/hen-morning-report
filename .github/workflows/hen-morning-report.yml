name: HEN Daily Morning Report

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  morning-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run morning report
        env:
          ERCOT_USERNAME: ${{ secrets.ERCOT_USERNAME }}
          ERCOT_PASSWORD: ${{ secrets.ERCOT_PASSWORD }}
          ERCOT_SUBSCRIPTION_KEY: ${{ secrets.ERCOT_SUBSCRIPTION_KEY }}
          ERCOT_NODES: ${{ secrets.ERCOT_TEST_NODES }}
        run: python hen_morning_report.py

      - name: Commit history.json back to repo
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/history.json
          git diff --staged --quiet || git commit -m "History update — $(date -u +%Y-%m-%d)"
          git push

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-report-${{ github.run_id }}
          path: morning_report.html
          retention-days: 30

      - name: Deploy dashboard to Cloudflare Pages
        if: success()
        run: |
          mkdir -p deploy
          cp dashboard/index.html deploy/index.html
          cp latest.json         deploy/latest.json
          cp dashboard/history.json deploy/history.json
          echo "Deploying to Cloudflare Pages..."
          curl -s --fail \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -F "branch=main" \
            -F "files=@deploy/index.html;filename=index.html" \
            -F "files=@deploy/latest.json;filename=latest.json" \
            -F "files=@deploy/history.json;filename=history.json" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/${{ secrets.CF_PROJECT_NAME }}/deployments" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('success'):
              url = d.get('result',{}).get('url','')
              print(f'  Cloudflare deploy success: {url}')
          else:
              print(f'  Cloudflare errors: {d.get(\"errors\")}')
          "
