name: HEN Live Price Update

on:
  schedule:
    - cron: '0,15,30,45 11-23 * * 1-5'
    - cron: '0,15,30,45 0-4  * * 2-6'
  workflow_dispatch:

jobs:
  live-update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Pull live RT prices
        env:
          ERCOT_USERNAME: ${{ secrets.ERCOT_USERNAME }}
          ERCOT_PASSWORD: ${{ secrets.ERCOT_PASSWORD }}
          ERCOT_SUBSCRIPTION_KEY: ${{ secrets.ERCOT_SUBSCRIPTION_KEY }}
          ERCOT_NODES: ${{ secrets.ERCOT_TEST_NODES }}
        run: python hen_live_prices.py

      - name: Deploy live.json to Cloudflare Pages
        run: |
          echo "Deploying live.json to Cloudflare Pages..."
          curl -s --fail \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -F "branch=main" \
            -F "files=@live.json;filename=live.json" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/${{ secrets.CF_PROJECT_NAME }}/deployments" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('success'):
              print(f'  Cloudflare deploy success')
          else:
              print(f'  Cloudflare errors: {d.get(\"errors\")}')
          "
