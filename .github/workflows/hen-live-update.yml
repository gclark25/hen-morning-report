name: HEN Live Price Update

on:
  schedule:
    # Every 15 minutes from 11:00 UTC (6 AM CT) to 03:45 UTC next day (10:45 PM CT)
    # GitHub cron is UTC. CT = UTC-5 (standard) / UTC-6 (daylight)
    # Running 11:00-04:00 UTC covers 6 AM - 11 PM CT conservatively
    - cron: '0,15,30,45 11-23 * * 1-5'
    - cron: '0,15,30,45 0-4  * * 2-6'
  workflow_dispatch:

jobs:
  live-update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Pull live RT prices
        env:
          ERCOT_USERNAME: ${{ secrets.ERCOT_USERNAME }}
          ERCOT_PASSWORD: ${{ secrets.ERCOT_PASSWORD }}
          ERCOT_SUBSCRIPTION_KEY: ${{ secrets.ERCOT_SUBSCRIPTION_KEY }}
          ERCOT_NODES: ${{ secrets.ERCOT_TEST_NODES }}
        run: python hen_live_prices.py

      - name: Deploy live.json to Netlify
        run: |
          echo "Deploying live.json to Netlify..."
          curl -s --fail \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @<(zip -j - live.json) \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'  Netlify: {d.get(\"state\",\"unknown\")}')
          "
