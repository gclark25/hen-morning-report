name: HEN Live Price Update

on:
  schedule:
    - cron: '0,15,30,45 11-23 * * 1-5'
    - cron: '0,15,30,45 0-4  * * 2-6'
  workflow_dispatch:

jobs:
  live-update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Pull live RT prices
        env:
          ERCOT_USERNAME: ${{ secrets.ERCOT_USERNAME }}
          ERCOT_PASSWORD: ${{ secrets.ERCOT_PASSWORD }}
          ERCOT_SUBSCRIPTION_KEY: ${{ secrets.ERCOT_SUBSCRIPTION_KEY }}
          ERCOT_NODES: ${{ secrets.ERCOT_TEST_NODES }}
        run: python hen_live_prices.py

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          mkdir -p deploy

          # Copy dashboard files from repo
          cp dashboard/index.html deploy/index.html
          cp dashboard/history.json deploy/history.json

          # Fetch latest.json from live Cloudflare site (already deployed by morning report)
          curl -sf "https://hen-dashboard.georgia-catherine5.workers.dev/latest.json" \
            -o deploy/latest.json || echo "{}" > deploy/latest.json

          # Copy live.json generated by this run
          cp live.json deploy/live.json

          npm install -g wrangler
          wrangler pages deploy deploy/ \
            --project-name=hen-dashboard \
            --branch=main \
            --commit-dirty=true
