name: ERCOT Public API Test

on:
  workflow_dispatch:

jobs:
  test-ercot-public:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Run ERCOT public API test
        env:
          ERCOT_USERNAME: ${{ secrets.ERCOT_USERNAME }}
          ERCOT_PASSWORD: ${{ secrets.ERCOT_PASSWORD }}
          ERCOT_SUBSCRIPTION_KEY: ${{ secrets.ERCOT_SUBSCRIPTION_KEY }}
          ERCOT_TEST_NODES: ${{ secrets.ERCOT_TEST_NODES }}
        run: python ercot_public_test.py

      - name: Save test results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ercot-public-test-results
          path: ercot_public_test_results.json
          retention-days: 30

